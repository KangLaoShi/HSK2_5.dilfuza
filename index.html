<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSK 2 Lesson 5 - Dilfuza Kāng lǎo shī</title>
    
    <!-- Google Fonts for better Chinese and Latin rendering -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Noto Sans', 'Noto Sans SC', sans-serif;
        }

        /* Custom Utilities for 3D Flip */
        .perspective-1000 {
            perspective: 1000px;
            -webkit-perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }
        .rotate-y-0 {
            transform: rotateY(0deg);
            -webkit-transform: rotateY(0deg);
        }
        
        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        /* Hide scrollbar for nav */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Inline Icons (Replacing external dependency for stability) ---
        const Icon = ({ path, className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const Icons = {
            BookOpen: (props) => <Icon {...props} path={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />,
            MessageCircle: (props) => <Icon {...props} path={<><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></>} />,
            GraduationCap: (props) => <Icon {...props} path={<><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></>} />,
            CheckCircle: (props) => <Icon {...props} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />,
            RotateCw: (props) => <Icon {...props} path={<><path d="M21 2v6h-6"/><path d="M21 13a9 9 0 1 1-3-7.7L21 8"/></>} />,
            ChevronRight: (props) => <Icon {...props} path={<polyline points="9 18 15 12 9 6"/>} />,
            ChevronLeft: (props) => <Icon {...props} path={<polyline points="15 18 9 12 15 6"/>} />,
            Award: (props) => <Icon {...props} path={<><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>} />,
            PlayCircle: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></>} />,
            Globe: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>} />,
            Volume2: (props) => <Icon {...props} path={<><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></>} />
        };

        const HSKLesson5App = () => {
            const [activeTab, setActiveTab] = useState('vocab');
            
            // Data Source based on HSK 2 Lesson 5 PDF
            const vocabulary = [
                { id: 1, hanzi: '外面', pinyin: 'wàimiàn', type: 'ot', uzbek: 'tashqarida' },
                { id: 2, hanzi: '准备', pinyin: 'zhǔnbèi', type: "fe'l", uzbek: 'tayyorlamoq, rejalashtirmoq' },
                { id: 3, hanzi: '就', pinyin: 'jiù', type: 'rav', uzbek: 'xulosa va qaror chiqarishda ishlatiladi' },
                { id: 4, hanzi: '鱼', pinyin: 'yú', type: 'ot', uzbek: 'baliq' },
                { id: 5, hanzi: '吧', pinyin: 'ba', type: 'yuk', uzbek: "ko'makchi, taklif, maslahatda ishlatiladi" },
                { id: 6, hanzi: '件', pinyin: 'jiàn', type: 'his.s', uzbek: 'kiyim-kechakka nisbatan' },
                { id: 7, hanzi: '还', pinyin: 'hái', type: 'rav', uzbek: 'nisbatan, hali' },
                { id: 8, hanzi: '可以', pinyin: 'kěyǐ', type: 'sif', uzbek: "bo'ladi, yomon emas" },
                { id: 9, hanzi: '不错', pinyin: 'búcuò', type: 'sif', uzbek: 'yomon emas, yaxshi' },
                { id: 10, hanzi: '考试', pinyin: 'kǎoshì', type: 'ot', uzbek: 'imtihon' },
                { id: 11, hanzi: '意思', pinyin: 'yìsi', type: 'ot', uzbek: "ma'no" },
                { id: 12, hanzi: '咖啡', pinyin: 'kāfēi', type: 'ot', uzbek: 'qahva' },
                { id: 13, hanzi: '对', pinyin: 'duì', type: 'old ko\'m', uzbek: 'uchun (ot yoki olmoshdan keyin)' },
                { id: 14, hanzi: '以后', pinyin: 'yǐhòu', type: 'ot', uzbek: 'keyin, keyinchalik' }
            ];

            const dialogues = [
                {
                title: "1. 在家里 (Uyda)",
                lines: [
                    { role: 'A', pinyin: 'Wǎnshang wǒmen qù fànguǎn chī fàn, zěnmeyàng?', hanzi: '晚上我们去饭馆吃饭，怎么样？', uzbek: 'Kechqurun restoranga ovqatlanishga borsak, nima deysan?' },
                    { role: 'B', pinyin: 'Wǒ bù xiǎng qù wàimiàn chī, wǒ xiǎng zài jiā chī.', hanzi: '我不想去外面吃，我想在家吃。', uzbek: 'Ko\'chada ovqatlanishni xohlamayman, uyda ovqatlangim kelyapti.' },
                    { role: 'A', pinyin: 'Nà nǐ zhǔnbèi zuò shénme ne?', hanzi: '那你准备做什么呢？', uzbek: 'Unda nima tayyorlaysan?' },
                    { role: 'B', pinyin: 'Jiù zuò nǐ ài chī de yú ba.', hanzi: '就做你爱吃的鱼吧。', uzbek: 'Sen yaxshi ko\'radigan baliqni tayyorlayman.' }
                ]
                },
                {
                title: "2. 在商店 (Do'konda)",
                lines: [
                    { role: 'A', pinyin: 'Bāng wǒ kàn yíxià zhè jiàn yīfu zěnmeyàng.', hanzi: '帮我看一下这件衣服怎么样。', uzbek: 'Bu kiyimga nima deysan? (Menga qarab yubor)' },
                    { role: 'B', pinyin: 'Yánsè hái kěyǐ, jiùshì yǒudiǎnr dà.', hanzi: '颜色还可以，就是有点儿大。', uzbek: 'Rangi yaxshi (nisbatan), lekin bir oz katta ko\'rinadi.' },
                    { role: 'A', pinyin: 'Zhè jiàn xiǎo de zěnmeyàng?', hanzi: '这件小的怎么样？', uzbek: 'Mana bu kichkinasiga nima deysan?' },
                    { role: 'B', pinyin: 'Zhè jiàn búcuò, jiù mǎi zhè jiàn ba.', hanzi: '这件不错，就买这件吧。', uzbek: 'Bunisi yomon emas, shunisini ola qol.' }
                ]
                },
                {
                title: "3. 在教室 (Sinfxonada)",
                lines: [
                    { role: 'A', pinyin: 'Jīntiān qù bu qù dǎ qiú?', hanzi: '今天去不去打球？', uzbek: 'Bugun koptok o\'ynashga borasanmi?' },
                    { role: 'B', pinyin: 'Zhè liǎng tiān yǒudiǎnr lèi, bú qù dǎ qiú le.', hanzi: '这两天有点儿累，不去打球了。', uzbek: 'Shu ikki kun ichida bir oz charchadim, koptok o\'ynashga bormayman.' },
                    { role: 'A', pinyin: 'Nǐ zài zuò shénme ne? Shì zài xiǎng zuótiān de kǎoshì ma?', hanzi: '你在做什么呢？是在想昨天的考试吗？', uzbek: 'Sen nima qilyapsan? Kechagi imtihonni o\'ylayapsanmi?' },
                    { role: 'B', pinyin: 'Shì a, wǒ juéde tīng hé shuō hái kěyǐ, dú hé xiě bù hǎo, hěn duō zì wǒ dōu bù zhīdào shì shénme yìsi.', hanzi: '是啊，我觉得听和说还可以，读和写不好，很多字我都不知道是什么意思。', uzbek: 'Ha-da, menimcha, eshitish va gapirish yaxshi, o\'qish va yozish yaxshi emas, ko\'pgina iyerogliflarning ma\'nosini bilmadim.' }
                ]
                },
                {
                title: "4. 在公司 (Ofisda/Kompaniyada)",
                lines: [
                    { role: 'A', pinyin: 'Xiūxi yíxià ba, hē kāfēi ma?', hanzi: '休息一下吧，喝咖啡吗？', uzbek: 'Bir oz dam ola qolaylik, qahva ichasanmi?' },
                    { role: 'B', pinyin: 'Bù hē le, wǒ yǐjīng hē liǎng bēi le.', hanzi: '不喝了，我已经喝两杯了。', uzbek: 'Ichmayman, rahmat. Allaqachon ikki finjon ichdim.' },
                    { role: 'A', pinyin: 'Shì a, kāfēi hē duō le duì shēntǐ bù hǎo.', hanzi: '是啊，咖啡喝多了对身体不好。', uzbek: 'Ha, ko\'p qahva ichish sog\'liq uchun zararli.' },
                    { role: 'B', pinyin: 'Yǐhòu wǒ shǎo hē yìdiǎnr, měi tiān hē yì bēi.', hanzi: '以后我少喝一点儿，每天喝一杯。', uzbek: 'Keyinchalik kamaytiraman (ozroq ichaman), kuniga bir marta ichaman.' }
                ]
                }
            ];

            const grammarPoints = [
                {
                title: "1. “就” (Jiù) ravishi",
                description: {
                    uz: "“就 + fe'l” yuqorida aytilgan fikrlar orqali xulosa va qaror chiqarishni anglatadi.",
                    en: "The structure “就 + Verb” connects to the previous context to draw a conclusion or make a resolution based on the mentioned situation.",
                    ru: "Конструкция “就 + глагол” связывает предложение с предыдущим контекстом для вывода заключения или принятия решения на основе упомянутой ситуации."
                },
                examples: [
                    { zh: "你不想去，就在家休息吧。", uz: "Siz bormoqchi bo'lmasangiz, uyda dam oling." },
                    { zh: "这儿的咖啡不错，就喝咖啡吧。", uz: "Bu yerning kofesi yaxshi, shuning uchun kofe icha qolaylik." },
                    { zh: "就做你爱吃的鱼吧。", uz: "Siz yoqtirgan baliqni pishiraylik." }
                ]
                },
                {
                title: "2. “还” (Hái) ohang ravishi",
                description: {
                    uz: "“还 + sifat” biror bir holatni bazo'r yengib o'tganlikni, 'yomon emas', 'bo'ladi' ma'nosini ifodalaydi.",
                    en: "“还 + Adjective” indicates that something is passable or acceptable. It expresses a rating that is just so-so, not very good but not bad.",
                    ru: "“还 + прилагательное” указывает на то, что что-то является сносным или приемлемым. Выражает оценку “так себе”, не очень хорошо, но и не плохо."
                },
                examples: [
                    { zh: "A: 你身体怎么样？ B: 还好。", uz: "A: Sog'ligingiz qanday? B: Yaxshi." },
                    { zh: "A: 这件衣服大吗？ B: 还行，不太大。", uz: "A: Bu kiyim kattami? B: Bo'ldi, unchalik katta emas." }
                ]
                },
                {
                title: "3. “有点儿” (Yǒudiǎnr) daraja ravishi",
                description: {
                    uz: "“有点儿 + sifat/fe'l” odatda gapiruvchi shaxsning salbiy va norozi kayfiyatini ifodalashda ishlatiladi. O'zbek tiliga 'biroz', 'sal' deb tarjima qilinadi.",
                    en: "“有点儿 + Adj/Verb” implies a slight degree, often carrying a negative tone or dissatisfaction/complaint. It translates to 'a little' or 'slightly'.",
                    ru: "“有点儿 + прил./глагол” означает небольшую степень чего-либо, часто с оттенком недовольства или жалобы. Переводится как “немного” или “чуть-чуть”."
                },
                examples: [
                    { zh: "今天天气有点儿冷。", uz: "Bugun ob-havo biroz sovuq." },
                    { zh: "我昨天有点儿累。", uz: "Kecha men biroz charchagan edim." },
                    { zh: "（这件衣服）有点儿大。", uz: "(Bu kiyim) biroz katta." }
                ]
                }
            ];

            const quizQuestions = [
                { id: 1, type: 'vocab', question: "O'zbek tilida 'yú' (鱼) nima degani?", options: ['Go\'sht', 'Baliq', 'Tovuq', 'Guruch'], correct: 1 },
                { id: 2, type: 'vocab', question: "'kǎoshì' (考试) so'zining tarjimasi?", options: ['Dars', 'Teneffus', 'Imtihon', 'Uyga vazifa'], correct: 2 },
                { id: 3, type: 'grammar', question: "Bo'sh joyni to'ldiring: 这件衣服 ____ 大。(Kiyim biroz katta)", options: ['有点儿', '一点儿', '个', '多'], correct: 0 },
                { id: 4, type: 'grammar', question: "Qaysi gapda '就' (jiù) to'g'ri ishlatilgan?", options: ['我就喝茶吧。', '我喝茶就吧。', '我喝就茶吧。', '就我喝茶吧。'], correct: 0 },
                { id: 5, type: 'vocab', question: "'准备' (zhǔnbèi) so'zining ma'nosi?", options: ['O\'qimoq', 'Tayyorlamoq', 'Yozmoq', 'Eshitmoq'], correct: 1 },
                { id: 6, type: 'vocab', question: "Kiyimlar uchun qaysi hisob so'z ishlatiladi?", options: ['个 (gè)', '口 (kǒu)', '件 (jiàn)', '本 (běn)'], correct: 2 },
                { id: 7, type: 'grammar', question: "Sog'ligingiz qanday? Javob: ____好。 (Yomon emas)", options: ['还', '不', '没', '都'], correct: 0 },
                { id: 8, type: 'dialogue', question: "Matnga ko'ra, B nega koptok o'ynashga bormadi?", options: ['Vaqti yo\'q', 'Kasal', 'Biroz charchagan', 'Xohlamaydi'], correct: 2 },
                { id: 9, type: 'vocab', question: "'yǐhòu' (以后) nima degani?", options: ['Oldin', 'Hozir', 'Keyinchalik', 'Kecha'], correct: 2 },
                { id: 10, type: 'grammar', question: "咖啡喝多了 ____ 身体不好。", options: ['给', '对', '在', '和'], correct: 1 },
                { id: 11, type: 'vocab', question: "'búcuò' (不错) so'zining sinonimi?", options: ['不好 (bù hǎo)', '很好 (hěn hǎo)', '很多 (hěn duō)', '很小 (hěn xiǎo)'], correct: 1 },
                { id: 12, type: 'dialogue', question: "B imtihonning qaysi qismidan norozi?", options: ['Eshitish va gapirish', 'O\'qish va yozish', 'Faqat yozish', 'Hammasi'], correct: 1 },
                { id: 13, type: 'vocab', question: "'意思' (yìsi) so'zining ma'nosi?", options: ['Qiziqarli', 'Ma\'no', 'Fikr', 'Savol'], correct: 1 },
                { id: 14, type: 'vocab', question: "'外面' (wàimiàn) so'zining antonimi (qarama-qarshi ma'nosi)?", options: ['里面 (lǐmiàn)', '上面 (shàngmiàn)', '下面 (xiàmiàn)', '后面 (hòumiàn)'], correct: 0 },
                { id: 15, type: 'grammar', question: "Bo'sh joyni to'ldiring: 这件不错，____ 买这件吧。", options: ['还', '就', '再', '也'], correct: 1 },
            ];

            // Components
            const Flashcard = ({ card }) => {
                const [isFlipped, setIsFlipped] = useState(false);

                const playAudio = (text, e) => {
                    e.stopPropagation(); // 阻止事件冒泡，防止触发翻转
                    
                    if ('speechSynthesis' in window) {
                        // 取消之前的发音，避免重叠
                        window.speechSynthesis.cancel();
                        
                        const utterance = new SpeechSynthesisUtterance(text);
                        utterance.lang = 'zh-CN';
                        utterance.rate = 0.9; // 稍微放慢语速
                        window.speechSynthesis.speak(utterance);
                    } else {
                        alert("Browser does not support text-to-speech");
                    }
                };

                return (
                <div 
                    className="h-64 w-full cursor-pointer group perspective-1000"
                    onClick={() => setIsFlipped(!isFlipped)}
                >
                    <div 
                        className={`relative h-full w-full transition-all duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : 'rotate-y-0'}`}
                    >
                    {/* Front */}
                    <div 
                        className="absolute inset-0 bg-white border-2 border-blue-200 rounded-xl shadow-lg flex flex-col items-center justify-center p-6 hover:shadow-xl transition-shadow backface-hidden"
                    >
                        <button 
                            onClick={(e) => playAudio(card.hanzi, e)}
                            className="absolute top-3 right-3 p-3 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 hover:scale-110 transition-all z-20 shadow-sm"
                            title="Tinglash (Listen)"
                        >
                            <Icons.Volume2 className="w-6 h-6" />
                        </button>

                        <div className="text-sm text-gray-500 uppercase tracking-widest mb-2 font-medium">{card.type}</div>
                        <div className="text-5xl font-bold text-gray-800 mb-3">{card.hanzi}</div>
                        <div className="text-2xl text-blue-600 font-medium">{card.pinyin}</div>
                        <div className="mt-4 text-xs text-gray-400 font-light flex items-center">
                            <Icons.RotateCw className="w-3 h-3 mr-1" /> Javobni ko'rish uchun bosing
                        </div>
                    </div>

                    {/* Back */}
                    <div 
                        className="absolute inset-0 bg-gradient-to-br from-blue-600 to-blue-700 text-white rounded-xl shadow-lg flex flex-col items-center justify-center p-6 backface-hidden rotate-y-180"
                    >
                        <div className="text-xl font-medium text-center leading-relaxed">{card.uzbek}</div>
                        <div className="mt-6 text-sm opacity-75 border-t border-white/20 pt-2 w-full text-center">
                            Qaytish uchun bosing
                        </div>
                    </div>
                    </div>
                </div>
                );
            };

            const QuizSection = () => {
                const [currentQIndex, setCurrentQIndex] = useState(0);
                const [score, setScore] = useState(0);
                const [showResult, setShowResult] = useState(false);
                const [selectedOption, setSelectedOption] = useState(null);
                const [isAnswered, setIsAnswered] = useState(false);

                const handleOptionSelect = (index) => {
                if (isAnswered) return;
                setSelectedOption(index);
                setIsAnswered(true);
                if (index === quizQuestions[currentQIndex].correct) {
                    setScore(score + 1);
                }
                };

                const nextQuestion = () => {
                if (currentQIndex < quizQuestions.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                    setSelectedOption(null);
                    setIsAnswered(false);
                } else {
                    setShowResult(true);
                }
                };

                const restartQuiz = () => {
                setCurrentQIndex(0);
                setScore(0);
                setShowResult(false);
                setSelectedOption(null);
                setIsAnswered(false);
                };

                if (showResult) {
                return (
                    <div className="bg-white p-8 rounded-2xl shadow-lg text-center max-w-lg mx-auto border border-gray-100">
                    <Icons.Award className="w-20 h-20 text-yellow-500 mx-auto mb-4" />
                    <h3 className="text-2xl font-bold text-gray-800 mb-2">Test Yakunlandi!</h3>
                    <p className="text-gray-600 mb-6">Sizning natijangiz:</p>
                    <div className="text-5xl font-bold text-blue-600 mb-6">{score} / {quizQuestions.length}</div>
                    <p className="text-gray-500 mb-8">
                        {score === quizQuestions.length ? "Mukammal! 完美!" : 
                        score > 10 ? "Ajoyib natija! 很好!" : 
                        "Yana harakat qiling! 加油!"}
                    </p>
                    <button 
                        onClick={restartQuiz}
                        className="bg-blue-600 text-white px-8 py-3 rounded-full hover:bg-blue-700 transition flex items-center justify-center mx-auto"
                    >
                        <Icons.RotateCw className="w-5 h-5 mr-2" /> Qayta ishlash
                    </button>
                    </div>
                );
                }

                const currentQ = quizQuestions[currentQIndex];

                return (
                <div className="max-w-2xl mx-auto">
                    <div className="bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
                    <div className="flex justify-between items-center mb-6">
                        <span className="text-sm font-semibold text-blue-600 tracking-wider">SAVOL {currentQIndex + 1}/{quizQuestions.length}</span>
                        <span className="text-sm text-gray-400 font-medium bg-gray-100 px-2 py-1 rounded">{currentQ.type === 'vocab' ? 'Lug\'at' : currentQ.type === 'grammar' ? 'Grammatika' : 'Matn'}</span>
                    </div>
                    
                    <h3 className="text-xl font-medium text-gray-800 mb-8 leading-relaxed">{currentQ.question}</h3>
                    
                    <div className="space-y-3">
                        {currentQ.options.map((option, idx) => (
                        <button
                            key={idx}
                            onClick={() => handleOptionSelect(idx)}
                            className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex justify-between items-center group
                            ${!isAnswered 
                                ? 'hover:bg-blue-50 border-gray-100 hover:border-blue-300' 
                                : idx === currentQ.correct 
                                ? 'bg-green-50 border-green-500 text-green-700' 
                                : idx === selectedOption 
                                    ? 'bg-red-50 border-red-500 text-red-700' 
                                    : 'bg-gray-50 border-gray-100 opacity-50'
                            }`}
                        >
                            <span className="font-medium">{option}</span>
                            {isAnswered && idx === currentQ.correct && <Icons.CheckCircle className="w-5 h-5 text-green-500" />}
                        </button>
                        ))}
                    </div>

                    <div className="mt-8 flex justify-end">
                        <button
                        onClick={nextQuestion}
                        disabled={!isAnswered}
                        className={`px-6 py-2 rounded-lg flex items-center font-medium transition-colors ${
                            isAnswered 
                            ? 'bg-blue-600 text-white hover:bg-blue-700 shadow-md hover:shadow-lg' 
                            : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                        }`}
                        >
                        Keyingisi <Icons.ChevronRight className="w-4 h-4 ml-1" />
                        </button>
                    </div>
                    </div>
                </div>
                );
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col font-sans">
                {/* Header */}
                <header className="bg-gradient-to-r from-red-700 to-red-600 text-white py-8 px-4 shadow-lg">
                    <div className="max-w-5xl mx-auto text-center">
                    <div className="inline-block bg-white/20 px-3 py-1 rounded-full text-xs font-semibold mb-3 tracking-wide backdrop-blur-sm">
                        HSK 2 - 第五课
                    </div>
                    <h1 className="text-3xl md:text-4xl font-bold mb-2 tracking-tight">就买这件吧</h1>
                    <p className="text-lg md:text-xl opacity-90 font-light italic">Shuni ola qolaylik</p>
                    <div className="mt-4 text-white/80 font-medium border-t border-white/20 pt-4 inline-block px-8 text-sm md:text-base">
                        Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                    </div>
                    </div>
                </header>

                {/* Navigation */}
                <nav className="bg-white shadow-sm sticky top-0 z-10 border-b border-gray-100">
                    <div className="max-w-5xl mx-auto px-2 md:px-4">
                    <div className="flex overflow-x-auto space-x-1 sm:justify-center py-2 no-scrollbar">
                        {[
                        { id: 'vocab', icon: Icons.BookOpen, label: "Yangi so'zlar" },
                        { id: 'dialogue', icon: Icons.MessageCircle, label: "Matn (Dialog)" },
                        { id: 'grammar', icon: Icons.GraduationCap, label: "Grammatika" },
                        { id: 'quiz', icon: Icons.CheckCircle, label: "Test (15 savol)" },
                        ].map((tab) => (
                        <button
                            key={tab.id}
                            onClick={() => setActiveTab(tab.id)}
                            className={`flex items-center px-4 py-3 rounded-lg transition-all whitespace-nowrap text-sm md:text-base font-medium ${
                            activeTab === tab.id 
                                ? 'bg-red-50 text-red-600 shadow-sm ring-1 ring-red-100' 
                                : 'text-gray-600 hover:bg-gray-50'
                            }`}
                        >
                            <span className="mr-2"><tab.icon /></span>
                            {tab.label}
                        </button>
                        ))}
                    </div>
                    </div>
                </nav>

                {/* Main Content */}
                <main className="flex-grow max-w-5xl w-full mx-auto p-4 sm:p-6 md:p-8">
                    
                    {/* Vocabulary View */}
                    {activeTab === 'vocab' && (
                    <div className="animate-fade-in">
                        <div className="flex items-center mb-6">
                            <div className="h-8 w-1 bg-red-500 rounded-full mr-3"></div>
                            <h2 className="text-2xl font-bold text-gray-800">Yangi so'zlar (生词)</h2>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        {vocabulary.map((word) => (
                            <Flashcard key={word.id} card={word} />
                        ))}
                        </div>
                    </div>
                    )}

                    {/* Dialogue View */}
                    {activeTab === 'dialogue' && (
                    <div className="space-y-12 animate-fade-in">
                        {dialogues.map((dialogue, dIndex) => (
                        <div key={dIndex} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div className="bg-red-50 px-6 py-4 border-b border-red-100 flex items-center">
                            <Icons.PlayCircle className="w-6 h-6 text-red-500 mr-2" />
                            <h3 className="font-bold text-lg text-gray-800">{dialogue.title}</h3>
                            </div>
                            <div className="p-4 md:p-6 space-y-6 bg-gray-50/50">
                            {dialogue.lines.map((line, lIndex) => (
                                <div key={lIndex} className={`flex ${line.role === 'B' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[90%] md:max-w-[80%] rounded-2xl p-4 shadow-sm relative ${
                                    line.role === 'B' 
                                    ? 'bg-blue-600 text-white rounded-tr-none' 
                                    : 'bg-white text-gray-800 border border-gray-200 rounded-tl-none'
                                }`}>
                                    <div className="text-xs opacity-70 mb-1 font-bold tracking-wider">{line.role}</div>
                                    <div className="text-lg md:text-xl font-bold mb-1">{line.hanzi}</div>
                                    <div className={`text-sm mb-3 font-medium ${line.role === 'B' ? 'text-blue-100' : 'text-gray-500'}`}>{line.pinyin}</div>
                                    <div className={`text-sm pt-2 border-t leading-relaxed ${line.role === 'B' ? 'border-blue-500/50 text-blue-50' : 'border-gray-100 text-gray-600'}`}>
                                    {line.uzbek}
                                    </div>
                                </div>
                                </div>
                            ))}
                            </div>
                        </div>
                        ))}
                    </div>
                    )}

                    {/* Grammar View */}
                    {activeTab === 'grammar' && (
                    <div className="space-y-8 animate-fade-in">
                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 rounded-r-lg">
                        <div className="flex items-center">
                            <Icons.Globe className="w-5 h-5 text-blue-600 mr-2" />
                            <p className="text-blue-800 font-medium">Grammatika tushuntirishlari (Uzbek • English • Русский)</p>
                        </div>
                        </div>

                        {grammarPoints.map((point, index) => (
                        <div key={index} className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">
                            <h3 className="text-2xl font-bold text-red-600 mb-6 border-b pb-4 flex items-center">
                                <span className="mr-2">{point.title}</span>
                            </h3>
                            
                            <div className="space-y-4 mb-8">
                            {/* Uzbek Explanation */}
                            <div className="bg-green-50 rounded-lg p-4 border border-green-100 hover:shadow-sm transition-shadow">
                                <span className="text-xs font-bold text-green-700 bg-green-200 px-2 py-1 rounded uppercase tracking-wider mb-2 inline-block">Uzbek</span>
                                <p className="text-gray-800 leading-relaxed">{point.description.uz}</p>
                            </div>

                            {/* English Explanation */}
                            <div className="bg-blue-50 rounded-lg p-4 border border-blue-100 hover:shadow-sm transition-shadow">
                                <span className="text-xs font-bold text-blue-700 bg-blue-200 px-2 py-1 rounded uppercase tracking-wider mb-2 inline-block">English</span>
                                <p className="text-gray-800 leading-relaxed">{point.description.en}</p>
                            </div>

                            {/* Russian Explanation */}
                            <div className="bg-purple-50 rounded-lg p-4 border border-purple-100 hover:shadow-sm transition-shadow">
                                <span className="text-xs font-bold text-purple-700 bg-purple-200 px-2 py-1 rounded uppercase tracking-wider mb-2 inline-block">Русский</span>
                                <p className="text-gray-800 leading-relaxed">{point.description.ru}</p>
                            </div>
                            </div>

                            <div className="space-y-4">
                            <h4 className="font-semibold text-gray-500 uppercase text-xs tracking-wider border-b border-gray-100 pb-2">Misollar (Examples / Примеры):</h4>
                            {point.examples.map((ex, i) => (
                                <div key={i} className="flex flex-col sm:flex-row sm:items-center bg-gray-50 p-4 rounded-lg">
                                <div className="sm:w-1/2 font-medium text-lg text-gray-800 mb-1 sm:mb-0">{ex.zh}</div>
                                <div className="hidden sm:block text-gray-300 mx-4 transform scale-150">→</div>
                                <div className="sm:w-1/2 text-gray-600 italic">{ex.uz}</div>
                                </div>
                            ))}
                            </div>
                        </div>
                        ))}
                    </div>
                    )}

                    {/* Quiz View */}
                    {activeTab === 'quiz' && (
                    <div className="animate-fade-in">
                        <div className="text-center mb-8">
                            <h2 className="text-3xl font-bold text-gray-800">Mustahkamlash uchun test</h2>
                            <p className="text-gray-500 mt-2">15 ta savol • Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz</p>
                        </div>
                        <QuizSection />
                    </div>
                    )}
                </main>

                {/* Footer */}
                <footer className="bg-gray-800 text-gray-400 py-10 text-center mt-12 border-t border-gray-700">
                    <p className="font-medium text-lg text-gray-300">HSK 2 Standard Course - Lesson 5</p>
                    <p className="mt-2 text-sm opacity-60">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
                </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HSKLesson5App />);
    </script>
</body>
</html>
